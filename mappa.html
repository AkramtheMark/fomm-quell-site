<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mappa Interattiva | Fômm Quell</title>
  
  <link rel="icon" href="assets/Images/FQ_icona.ico" type="image/x-icon">
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  
  <!-- Core Stylesheet -->
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* Custom layout for the full screen map */
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .map-header {
      background-color: var(--color-bg);
      border-bottom: var(--border-width) solid var(--color-cream);
      padding: 0.8rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
    }

    .map-wrapper {
      position: relative;
      flex-grow: 1;
      height: calc(100vh - 70px);
      width: 100%;
    }

    #leaflet-map {
      width: 100%;
      height: 100%;
      z-index: 1;
      background-color: #0c0c0d;
    }

    /* Sidebar brutalista */
    .map-sidebar {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 360px;
      max-height: calc(100% - 40px);
      background-color: var(--color-card-bg);
      border: var(--border-width) solid var(--color-cream);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow-brutal-pink);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.3s ease;
    }

    .sidebar-header {
      padding: 1.2rem;
      border-bottom: 2px solid var(--color-cream);
      background-color: var(--color-bg);
    }

    .sidebar-header h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .sidebar-content {
      padding: 1.2rem;
      overflow-y: auto;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* List of events on map */
    .map-events-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .map-event-item {
      padding: 0.8rem;
      background-color: var(--color-bg);
      border: 2px solid var(--color-cream);
      border-radius: var(--border-radius);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }

    .map-event-item:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0px var(--color-pink);
      border-color: var(--color-pink);
    }

    .map-event-item h4 {
      font-size: 1rem;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
    }

    .map-event-meta {
      font-size: 0.75rem;
      color: var(--color-pink);
      font-weight: 700;
      margin-bottom: 0.2rem;
    }

    .map-event-loc {
      font-size: 0.8rem;
      color: var(--color-gray);
    }

    /* Style customizations for Leaflet popups */
    .leaflet-popup-content-wrapper {
      background-color: var(--color-card-bg) !important;
      color: var(--color-cream) !important;
      border: 3px solid var(--color-cream) !important;
      border-radius: var(--border-radius) !important;
      box-shadow: var(--shadow-brutal-pink) !important;
      font-family: var(--font-body) !important;
      padding: 0 !important;
    }

    .leaflet-popup-content {
      margin: 0 !important;
      padding: 1rem !important;
      width: 250px !important;
    }

    .leaflet-popup-tip-container {
      display: none !important;
    }

    .popup-title {
      font-family: var(--font-display);
      font-weight: 800;
      text-transform: uppercase;
      font-size: 1.1rem;
      margin-bottom: 0.4rem;
      color: var(--color-cream);
    }

    .popup-meta {
      font-size: 0.75rem;
      color: var(--color-pink);
      font-weight: 700;
      margin-bottom: 0.6rem;
    }

    .popup-desc {
      font-size: 0.8rem;
      color: var(--color-gray);
      line-height: 1.4;
      margin-bottom: 0.8rem;
    }

    .popup-btn {
      display: inline-block;
      width: 100%;
      text-align: center;
      background-color: var(--color-pink);
      color: var(--color-dark);
      font-weight: 700;
      border: 2px solid var(--color-dark);
      padding: 0.3rem 0.5rem;
      font-size: 0.75rem;
      border-radius: var(--border-radius);
      box-shadow: 2px 2px 0px var(--color-cream);
      transition: transform 0.1s, box-shadow 0.1s;
      text-decoration: none;
    }

    .popup-btn:hover {
      transform: translate(-1px, -1px);
      box-shadow: 3px 3px 0px var(--color-cream);
      color: var(--color-dark);
      text-decoration: none;
    }

    /* Custom markers styling */
    .custom-omino-marker {
      background: transparent !important;
      border: none !important;
      display: flex !important;
      align-items: flex-end !important;
      justify-content: center !important;
    }

    .omino-map-pin {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0px 0px 3px rgba(255, 255, 255, 0.35)) drop-shadow(2px 2px 0px rgba(0,0,0,1));
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform-origin: bottom center;
      cursor: pointer;
    }

    .omino-map-pin:hover {
      transform: scale(1.3) translateY(-5px);
    }

    /* Hover accents - category colors */
    .musica-accent:hover { filter: drop-shadow(0px 0px 6px #EF48A0) drop-shadow(3px 3px 0px rgba(0,0,0,1)); }
    .spettacolo-accent:hover { filter: drop-shadow(0px 0px 6px #9CF726) drop-shadow(3px 3px 0px rgba(0,0,0,1)); }
    .cultura-accent:hover { filter: drop-shadow(0px 0px 6px #20C6C1) drop-shadow(3px 3px 0px rgba(0,0,0,1)); }
    .arte-accent:hover { filter: drop-shadow(0px 0px 6px #9260F4) drop-shadow(3px 3px 0px rgba(0,0,0,1)); }
    .lab-accent:hover { filter: drop-shadow(0px 0px 6px #EFD933) drop-shadow(3px 3px 0px rgba(0,0,0,1)); }
    .altro-accent:hover { filter: drop-shadow(0px 0px 6px #F47621) drop-shadow(3px 3px 0px rgba(0,0,0,1)); }

    /* Custom Leaflet Zoom Controls Style */
    .leaflet-bar {
      border: var(--border-width) solid var(--color-dark) !important;
      box-shadow: 3px 3px 0px var(--color-pink) !important;
      border-radius: var(--border-radius) !important;
      overflow: hidden;
    }

    .leaflet-bar a {
      background-color: var(--color-cream) !important;
      color: var(--color-dark) !important;
      border-bottom: 2px solid var(--color-dark) !important;
      font-weight: 800 !important;
    }

    .leaflet-bar a:hover {
      background-color: var(--color-pink) !important;
    }

    /* Responsive mobile layout */
    @media (max-width: 768px) {
      .map-sidebar {
        width: calc(100% - 40px);
        height: auto;
        max-height: 40%;
        bottom: 20px;
        top: auto;
        left: 20px;
        transform: translateY(0);
        box-shadow: 0px -4px 10px rgba(0,0,0,0.3), var(--shadow-brutal-pink);
      }
      
      .sidebar-content {
        padding: 0.8rem;
      }
      
      .sidebar-header {
        padding: 0.8rem;
      }
    }
  </style>
</head>
<body>

  <!-- Custom Cursor for desktop -->
  <div class="custom-cursor"></div>

  <!-- Background Grain Overlay -->
  <div class="grain-overlay"></div>

  <!-- HEADER -->
  <header class="map-header">
    <a href="index.html" class="logo-wrapper" id="logo-link">
      <div class="logo-img">
        <img src="assets/FQ_icona.ico" alt="FÔMM QUELL Logo" class="logo-svg" style="width: 100%; height: 100%; object-fit: contain;">
      </div>
      <span class="logo-text">FÔMM QUELL</span>
    </a>
    
    <a href="index.html" class="btn btn-secondary btn-sm" style="box-shadow: 3px 3px 0px var(--color-pink);">← TORNA ALLA HOME</a>
  </header>

  <!-- MAP WRAPPER -->
  <div class="map-wrapper">
    <!-- Leaflet map element -->
    <div id="leaflet-map"></div>

    <!-- Sidebar controls and list -->
    <aside class="map-sidebar">
      <div class="sidebar-header">
        <h2>MAPPA EVENTI</h2>
        <!-- Week Navigator -->
        <div class="week-switcher" style="box-shadow: 3px 3px 0px var(--color-pink); width: 100%;">
          <button class="week-nav-btn" id="prev-week-btn" aria-label="Settimana precedente">←</button>
          <span class="week-display" id="week-display-range" style="font-size: 0.85rem; padding: 0 0.5rem; text-align: center; flex-grow: 1;">Caricamento...</span>
          <button class="week-nav-btn" id="next-week-btn" aria-label="Settimana successiva">→</button>
        </div>
      </div>
      
      <div class="sidebar-content">
        <!-- Category filters -->
        <div class="filter-wrapper" style="gap: 0.4rem; justify-content: center;">
          <button class="filter-btn active" data-filter="all" style="padding: 0.2rem 0.6rem; font-size: 0.7rem;">TUTTI</button>
          <button class="filter-btn" data-filter="musica" style="padding: 0.2rem 0.6rem; font-size: 0.7rem;">MUSICA</button>
          <button class="filter-btn" data-filter="spettacolo" style="padding: 0.2rem 0.6rem; font-size: 0.7rem;">SPETT.</button>
          <button class="filter-btn" data-filter="cultura" style="padding: 0.2rem 0.6rem; font-size: 0.7rem;">CULTURA</button>
          <button class="filter-btn" data-filter="arte" style="padding: 0.2rem 0.6rem; font-size: 0.7rem;">ARTE</button>
        </div>
        
        <!-- List of events in active week -->
        <div class="map-events-list" id="map-events-container">
          <p style="text-align: center; color: var(--color-gray); font-size: 0.9rem;">Caricamento eventi...</p>
        </div>
      </div>
    </aside>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  
  <!-- JavaScript Logic -->
  <script type="module" src="map-page.js"></script>
</body>
</html>
