<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Background drop shadow for retro offset effect -->
  <polygon points="53,8 92,30.5 92,75.5 53,98 14,75.5 14,30.5" fill="#121212" />
  
  <!-- Outer Hexagon (Reggio Emilia shape) -->
  <polygon points="50,5 89,27.5 89,72.5 50,95 11,72.5 11,27.5" fill="#FDFBF7" stroke="#121212" stroke-width="5" stroke-linejoin="round" />
  
  <!-- Inner Hexagon Frame -->
  <polygon points="50,11 84,30.5 84,69.5 50,89 16,69.5 16,30.5" fill="none" stroke="#FF2E93" stroke-width="3" stroke-linejoin="round" />
  
  <!-- Stylized Retro Eye -->
  <!-- Eye shape background -->
  <path d="M 22,50 C 30,30 70,30 78,50 C 70,70 30,70 22,50 Z" fill="#121212" stroke="#121212" stroke-width="2" />
  
  <!-- Iris (Pink) -->
  <circle cx="50" cy="50" r="15" fill="#FF2E93" stroke="#FDFBF7" stroke-width="2.5" />
  
  <!-- Pupil (Black/Cream) -->
  <circle cx="50" cy="50" r="7" fill="#FDFBF7" />
  <circle cx="50" cy="50" r="4" fill="#121212" />
  
  <!-- Geometric Eye Highlights / Eyelashes style details -->
  <line x1="50" y1="18" x2="50" y2="24" stroke="#FF2E93" stroke-width="3" stroke-linecap="round" />
  <line x1="50" y1="82" x2="50" y2="76" stroke="#FF2E93" stroke-width="3" stroke-linecap="round" />
  
  <line x1="22" y1="50" x2="16" y2="50" stroke="#FF2E93" stroke-width="3" stroke-linecap="round" />
  <line x1="78" y1="50" x2="84" y2="50" stroke="#FF2E93" stroke-width="3" stroke-linecap="round" />
</svg>
