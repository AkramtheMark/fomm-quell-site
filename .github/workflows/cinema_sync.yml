name: Scrape and Update Cinema Showtimes

on:
  schedule:
    - cron: '0 1 * * *' # Runs daily at 1:00 AM UTC
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  sync-cinemas:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push commit back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Scraper Script
        run: python scripts/scrape_cinemas.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add assets/cinema_events.json
          git commit -m "auto: update cinema showtimes [skip ci]" || echo "No changes to commit"
          git push
